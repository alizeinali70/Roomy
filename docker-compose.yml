services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: roomy-db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "RoomyDev@2024!"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P $$SA_PASSWORD -Q 'SELECT 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: roomy-api
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=RoomyDb;User Id=sa;Password=RoomyDev@2024!;Encrypt=false;TrustServerCertificate=true"
      Jwt__Secret: "your-super-secret-key-change-in-production-12345-minimum-32-chars"
      Jwt__Issuer: "roomy"
      Jwt__Audience: "roomy-api"
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
    ports:
      - "5000:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 10

volumes:
  sqlserver_data:
